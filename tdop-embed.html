<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Design of Pablo — Live Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Albert+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ease: cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Albert Sans", sans-serif;
      background: #f8f8f8;
      color: #242424;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Panels ─────────────────────────── */
    .panel {
      display: none;
      padding: 2rem 1.5rem 3rem;
      animation: slideUp 0.35s var(--ease);
    }
    .panel.active { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Typography ─────────────────────── */
    h2 {
      font-family: "Newsreader", serif;
      font-weight: 400;
      font-size: 1.6rem;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .sub {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.5;
    }

    /* ── Step 1: Capture ────────────────── */
    .capture-zone {
      border: 1.5px dashed #ccc;
      border-radius: 12px;
      padding: 3rem 1.5rem;
      text-align: center;
      background: rgba(0,0,0,0.02);
      margin-bottom: 1.5rem;
    }

    .camera-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .btn-primary {
      display: inline-block;
      background: #242424;
      color: #fff;
      padding: 0.85rem 2.2rem;
      border-radius: 40px;
      font-family: "Albert Sans", sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      border: none;
      margin: 1.4rem 0 0.75rem;
      transition: transform 0.15s, background 0.2s;
    }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      display: block;
      font-size: 0.85rem;
      color: #888;
      text-decoration: underline;
      cursor: pointer;
      margin: 0 auto;
      background: none;
      border: none;
      font-family: "Albert Sans", sans-serif;
    }

    /* ── Preview ────────────────────────── */
    .preview-wrap {
      display: none;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .preview-wrap.visible { display: block; }

    .preview-img-box {
      position: relative;
      display: inline-block;
      border-radius: 10px;
      overflow: hidden;
      max-width: 260px;
    }
    .preview-img-box img {
      width: 100%;
      display: block;
    }
    .retake-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-analyze {
      display: inline-block;
      background: #242424;
      color: #fff;
      padding: 0.85rem 2.2rem;
      border-radius: 40px;
      font-family: "Albert Sans", sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      margin-top: 1.2rem;
      transition: transform 0.15s;
    }
    .btn-analyze:active { transform: scale(0.97); }

    /* ── Step 2: Analyzing ──────────────── */
    .analyzing-wrap {
      text-align: center;
    }

    .analyzing-img {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 1.5rem;
      border-radius: 10px;
      overflow: hidden;
    }
    .analyzing-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 12px rgba(255,255,255,0.5);
      animation: scan 1.8s linear infinite;
    }
    @keyframes scan {
      0%   { top: 0%; }
      50%  { top: 100%; }
      100% { top: 0%; }
    }

    .dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 1rem;
    }
    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ccc;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Step 3: Results ────────────────── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.75rem;
    }

    .results-block {
      margin-bottom: 2rem;
    }

    /* style/mood header */
    .style-header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #e8e8e8;
      padding-bottom: 1.5rem;
    }
    #res-style {
      font-family: "Newsreader", serif;
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }
    #res-atmosphere {
      font-style: italic;
      font-size: 0.9rem;
      color: #666;
      margin-top: 0.5rem;
    }

    /* Color palette */
    .color-palette {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .color-entry {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    .swatch {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .swatch-meta { line-height: 1.3; }
    .swatch-name { font-size: 0.8rem; font-weight: 500; }
    .swatch-hex  { font-size: 0.72rem; color: #888; text-transform: uppercase; }

    /* Typography preview */
    .typo-block + .typo-block { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid #e8e8e8; }
    .typo-label { font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
    .typo-sample-h {
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.2;
    }
    .typo-sample-p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
    }

    /* Design notes */
    .notes-text {
      font-size: 0.9rem;
      line-height: 1.65;
      color: #555;
    }

    /* Apply button */
    .btn-apply {
      display: block;
      width: 100%;
      background: #242424;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: "Albert Sans", sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 2rem;
      transition: transform 0.15s, background 0.2s;
      text-align: center;
    }
    .btn-apply:hover { transform: translateY(-2px); }
    .btn-apply.applied { background: #3a7d55; }

    .btn-reset {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.75rem;
      font-family: "Albert Sans", sans-serif;
      font-size: 0.85rem;
      color: #888;
      cursor: pointer;
      margin-top: 0.75rem;
    }

    /* ── Toast ──────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #242424;
      color: #fff;
      padding: 0.6rem 1.4rem;
      border-radius: 30px;
      font-size: 0.85rem;
      transition: transform 0.3s var(--ease), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>

<body>

  <!-- ══ STEP 1: Capture ══════════════════════════════════════ -->
  <div id="step-capture" class="panel active">
    <h2>Capture a Vibe</h2>
    <p class="sub" style="margin-bottom: 1.25rem;">
      Take a photo of anything — nature, art, a room, a texture — and turn it into a live design system for this portfolio.
    </p>

    <div class="capture-zone" id="capture-zone">
      <div class="camera-icon">📷</div>
      <p class="sub">Point your camera at something beautiful.</p>
      <!-- Camera input: capture="environment" opens rear camera directly on mobile -->
      <label class="btn-primary" for="camera-input">Take Photo</label>
      <input type="file" id="camera-input" accept="image/*" capture="environment" hidden>
      <button class="btn-secondary" id="gallery-trigger">or choose from gallery</button>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <!-- Preview — shown after image is selected -->
    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-img-box">
        <img id="preview-img" src="" alt="Preview">
        <button class="retake-btn" id="retake-btn" title="Retake">↺</button>
      </div>
      <br>
      <button class="btn-analyze" id="analyze-btn">Extract Design System ✦</button>
    </div>
  </div>

  <!-- ══ STEP 2: Analyzing ════════════════════════════════════ -->
  <div id="step-analyze" class="panel">
    <div class="analyzing-wrap">
      <div class="analyzing-img">
        <img id="analyze-thumb" src="" alt="">
        <div class="scan-line"></div>
      </div>
      <h2>Reading the Image</h2>
      <p class="sub" id="status-text">Analyzing colors, mood, and aesthetic…</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ══ STEP 3: Results ══════════════════════════════════════ -->
  <div id="step-results" class="panel">

    <div class="style-header">
      <div class="section-label">Style</div>
      <div id="res-style">—</div>
      <p id="res-mood" class="sub" style="margin-top: 0.2rem;"></p>
      <p id="res-atmosphere"></p>
    </div>

    <div class="results-block">
      <div class="section-label">Colors</div>
      <div class="color-palette" id="color-palette"></div>
    </div>

    <div class="results-block">
      <div class="section-label">Typography</div>
      <div id="typo-preview"></div>
    </div>

    <div class="results-block">
      <div class="section-label">Notes</div>
      <p class="notes-text" id="design-notes"></p>
    </div>

    <button class="btn-apply" id="apply-btn">Apply Theme to Portfolio ✦</button>
    <button class="btn-reset" id="reset-btn">Start Over with a New Photo</button>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    // ── State ───────────────────────────────────────────────────
    var state = { imageData: null, mimeType: null, designSystem: null };

    // ── DOM ─────────────────────────────────────────────────────
    var $ = function (sel) { return document.querySelector(sel); };

    var panels = [
      $('#step-capture'),
      $('#step-analyze'),
      $('#step-results')
    ];

    // ── Utilities ───────────────────────────────────────────────
    function showStep(n) {
      panels.forEach(function (p, i) {
        p.classList.toggle('active', i === n);
      });
      window.scrollTo(0, 0);
    }

    function showToast(msg) {
      var t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 3000);
    }

    function loadFont(family, el) {
      if (!family) return;
      var id = 'gf-' + family.toLowerCase().replace(/\s+/g, '-');
      if (!document.getElementById(id)) {
        var link = document.createElement('link');
        link.id   = id;
        link.rel  = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family='
          + encodeURIComponent(family) + ':wght@400;500;700&display=swap';
        document.head.appendChild(link);
      }
      if (el) el.style.fontFamily = '"' + family + '"';
    }

    // ── Image Handling ──────────────────────────────────────────
    function handleFile(file) {
      if (!file) return;
      state.mimeType = file.type || 'image/jpeg';
      var reader = new FileReader();
      reader.onload = function (e) {
        state.imageData = e.target.result;
        $('#preview-img').src = state.imageData;
        $('#capture-zone').style.display = 'none';
        $('#preview-wrap').classList.add('visible');
      };
      reader.readAsDataURL(file);
    }

    $('#camera-input').addEventListener('change', function (e) { handleFile(e.target.files[0]); });
    $('#file-input').addEventListener('change', function (e)  { handleFile(e.target.files[0]); });
    $('#gallery-trigger').addEventListener('click', function () { $('#file-input').click(); });

    $('#retake-btn').addEventListener('click', function () {
      state.imageData = null;
      $('#camera-input').value = '';
      $('#file-input').value = '';
      $('#preview-img').src = '';
      $('#capture-zone').style.display = '';
      $('#preview-wrap').classList.remove('visible');
    });

    // ── Analysis ────────────────────────────────────────────────
    $('#analyze-btn').addEventListener('click', function () {
      if (!state.imageData) return;
      $('#analyze-thumb').src = state.imageData;
      showStep(1);
      runAnalysis();
    });

    var STATUS_MSGS = [
      'Analyzing colors, mood, and aesthetic…',
      'Scanning visual elements…',
      'Extracting color harmonies…',
      'Building typography profile…',
      'Generating design system…'
    ];

    async function runAnalysis() {
      var i = 0;
      var intv = setInterval(function () {
        i = (i + 1) % STATUS_MSGS.length;
        $('#status-text').textContent = STATUS_MSGS[i];
      }, 2200);

      try {
        var res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: state.imageData, mimeType: state.mimeType })
        });

        clearInterval(intv);

        var data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Analysis failed');

        state.designSystem = data.designSystem;
        renderResults();
        showStep(2);

      } catch (err) {
        clearInterval(intv);
        showToast('Error: ' + err.message);
        showStep(0);
      }
    }

    // ── Render Results ──────────────────────────────────────────
    function renderResults() {
      var ds = state.designSystem;

      $('#res-style').textContent     = ds.style || '—';
      $('#res-mood').textContent      = ds.mood  || '';
      $('#res-atmosphere').textContent = ds.atmosphere || '';

      // Colors
      var pal = $('#color-palette');
      pal.innerHTML = '';
      var order = ['primary', 'secondary', 'accent', 'background', 'surface', 'text'];
      order.forEach(function (key) {
        var hex = ds.colors && ds.colors[key];
        if (!hex) return;
        var name = (ds.colorNames && ds.colorNames[key]) || key;
        pal.innerHTML += '<div class="color-entry">'
          + '<div class="swatch" style="background:' + hex + '"></div>'
          + '<div class="swatch-meta">'
          + '<div class="swatch-name">' + name + '</div>'
          + '<div class="swatch-hex">' + hex + '</div>'
          + '</div></div>';
      });

      // Typography
      var typo = (ds.typography && ds.typography.suggestedFonts) || {};
      var hFont = typo.heading || 'Newsreader';
      var bFont = typo.body    || 'Albert Sans';

      var tWrap = $('#typo-preview');
      var hEl = document.createElement('div');
      hEl.className = 'typo-block';
      hEl.innerHTML = '<div class="typo-label">Heading — ' + hFont + '</div>'
        + '<div class="typo-sample-h">The quick brown fox</div>';
      var pEl = document.createElement('div');
      pEl.className = 'typo-block';
      pEl.innerHTML = '<div class="typo-label">Body — ' + bFont + '</div>'
        + '<div class="typo-sample-p">Typography is the art of arranging type to make written language legible, readable, and appealing when displayed.</div>';
      tWrap.innerHTML = '';
      tWrap.appendChild(hEl);
      tWrap.appendChild(pEl);

      loadFont(hFont, hEl.querySelector('.typo-sample-h'));
      loadFont(bFont, pEl.querySelector('.typo-sample-p'));

      // Design notes
      $('#design-notes').textContent = ds.designNotes || '';
    }

    // ── Apply Theme to Parent ───────────────────────────────────
    $('#apply-btn').addEventListener('click', function () {
      if (!state.designSystem) return;
      window.parent.postMessage({ type: 'tdop-apply', designSystem: state.designSystem }, '*');
      var btn = $('#apply-btn');
      btn.textContent = 'Applied ✓';
      btn.classList.add('applied');
      setTimeout(function () {
        btn.textContent = 'Apply Theme to Portfolio ✦';
        btn.classList.remove('applied');
      }, 2500);
    });

    // ── Reset ───────────────────────────────────────────────────
    $('#reset-btn').addEventListener('click', function () {
      state.imageData = null;
      state.mimeType  = null;
      state.designSystem = null;
      $('#camera-input').value = '';
      $('#file-input').value   = '';
      $('#preview-img').src    = '';
      $('#capture-zone').style.display = '';
      $('#preview-wrap').classList.remove('visible');
      showStep(0);
    });

  </script>
</body>
</html>
